<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="sNVMg_J8ppGagpGgbVNzwkEAia307XEJgFhjRFnT3fY" />
    <link rel="icon" type="image/jpeg" href="top1.jpg">
    <title>Rádio Top Itatiba FM - 91.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

    <style>
        :root { --azul-escuro: #0a0e27; --magenta: #b01a7a; --roxo-neon: #aa00ff; --dourado: #f3b644; --fundo-neon: #050816; --verde-whatsapp: #00ff55; --vermelho-no-ar: #ff0000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--fundo-neon); color: #eee; scroll-behavior: smooth; overflow-x: hidden; transition: background 1s ease; }

        /* GERAL & ANIMAÇÕES */
        .firework { position: fixed; width: 4px; height: 4px; border-radius: 50%; z-index: 9999; pointer-events: none; }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(30); opacity: 0; } }
        
        .noticias-ticker { background: #000; color: var(--dourado); padding: 10px 0; border-bottom: 2px solid var(--magenta); overflow: hidden; white-space: nowrap; font-weight: bold; font-size: 14px; text-transform: uppercase; display: flex; z-index: 900; }
        .ticker-label { background: var(--magenta); color: white; padding: 0 15px; z-index: 10; position: relative; box-shadow: 5px 0 10px rgba(0,0,0,0.5); display: flex; align-items: center; animation: pisca-plantao 1s infinite alternate; }
        @keyframes pisca-plantao { 0% { background: var(--magenta); box-shadow: 0 0 5px var(--magenta); } 100% { background: var(--vermelho-no-ar); box-shadow: 0 0 20px var(--vermelho-no-ar); } }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker-move 90s linear infinite; }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .noticia-item { display: inline-block; padding: 0 50px; } .noticia-item span { color: var(--magenta); margin-right: 8px; }

        nav { background: rgba(10, 14, 39, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(176, 26, 122, 0.5); padding: 12px 0; display: flex; justify-content: center; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 25px rgba(0,0,0,0.8); width: 100%; }
        nav a { color: #ddd; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 11px; transition: all 0.3s ease; padding: 8px 14px; border-radius: 20px; letter-spacing: 0.5px; position: relative; }
        nav a:hover, nav a:active { color: white !important; background: var(--magenta); box-shadow: 0 0 15px var(--magenta); transform: translateY(-2px); }

        /* ESTILO DO CHAT */
        .chat-msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 14px; animation: slideIn 0.3s ease; line-height: 1.4; }
        .bot-msg { background: rgba(176, 26, 122, 0.2); border: 1px solid var(--magenta); color: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
        .user-msg { background: rgba(0, 255, 85, 0.1); border: 1px solid var(--verde-whatsapp); color: #fff; align-self: flex-end; border-bottom-right-radius: 0; text-align: right; }
        .typing-indicator { color: var(--dourado); font-size: 11px; font-weight: bold; font-style: italic; align-self: flex-start; margin-bottom: 5px; display: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PAINEL PEDIDO & TEMPO */
        .painel-tempo-real { background: rgba(255, 255, 255, 0.05); border: 2px solid var(--magenta); border-radius: 15px; padding: 12px; margin: 15px auto; max-width: 500px; display: flex; justify-content: space-around; align-items: center; color: white; animation: animacaoCores 5s infinite ease-in-out; transition: border-color 1s ease; }
        @keyframes animacaoCores { 0% { border-color: var(--magenta); box-shadow: 0 0 15px var(--magenta); } 50% { border-color: var(--dourado); box-shadow: 0 0 15px var(--dourado); } 100% { border-color: var(--magenta); box-shadow: 0 0 15px var(--magenta); } }
        .tempo-item { text-align: center; } 
        .tempo-label { font-size: 9px; text-transform: uppercase; color: var(--dourado); font-weight: bold; display: block; } 
        .tempo-valor { font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tempo-valor:hover { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); transform: scale(1.1); }
        .active-timer { color: var(--verde-whatsapp); text-shadow: 0 0 10px var(--verde-whatsapp); }
        
        .painel-pedido { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--verde-whatsapp); border-radius: 15px; padding: 20px; margin: 20px 0; box-shadow: 0 0 10px rgba(37, 211, 102, 0.1); }
        .btn-pedido-zap { background: var(--verde-whatsapp); color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: 0.3s; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }

        /* IMAGENS & VIDEO */
        .banner-container { width: 100%; background-color: var(--azul-escuro); text-align: center; } .banner-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .no-ar-indicator { display: flex; align-items: center; justify-content: center; gap: 15px; background: linear-gradient(90deg, #1a0000 0%, #3d0000 50%, #1a0000 100%); color: var(--vermelho-no-ar); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding: 12px; border-radius: 12px; border: 2px solid var(--vermelho-no-ar); margin: 15px auto 10px auto; max-width: 600px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); animation: broadcast-pulse 3s infinite alternate ease-in-out; }
        .pulsing-dot { width: 10px; height: 10px; background-color: var(--vermelho-no-ar); border-radius: 50%; box-shadow: 0 0 10px var(--vermelho-no-ar); animation: blink-fast 0.8s infinite alternate; }

        .video-embed-container { max-width: 600px; margin: 10px auto; padding: 0 10px; }
        .video-embed { position: relative; padding-bottom: 100%; height: 0; overflow: hidden; background: #000; border: 3px solid var(--magenta); box-shadow: 0 0 20px var(--magenta); border-radius: 15px; animation: video-glow 5s infinite alternate; }
        .bg-blur-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.6); z-index: 1; }
        .capa-tv-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 90%; width: auto; aspect-ratio: 1/1; object-fit: cover; z-index: 2; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); }

        /* PLAYER & CONTROLES */
        .player-bar { background: linear-gradient(90deg, #120c22 0%, #2e003e 100%); color: white; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; border-top: 2px solid var(--magenta); position: relative; overflow: hidden; }
        #visualizer-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4; pointer-events: none; }
        .album-cover { width: 50px; height: 50px; background: #000; border-radius: 10px; border: 2px solid var(--magenta); display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 2;}
        .bars { display: flex; align-items: flex-end; height: 30px; gap: 3px; } .bar { width: 6px; background: var(--dourado); animation: equalizer 1s infinite ease-in-out; }
        .player-info { display: flex; align-items: center; gap: 20px; width: 100%; max-width: 800px; justify-content: center; flex-wrap: wrap; z-index: 2; }
        .glass-controls { position: relative; background: rgba(40, 0, 60, 0.6); backdrop-filter: blur(8px); border-radius: 50px; padding: 10px 25px; display: flex; align-items: center; gap: 20px; width: fit-content; margin: 10px 0; z-index: 10; }
        .btn-player-modern { width: 70px; height: 70px; background: linear-gradient(135deg, var(--magenta), var(--roxo-neon)); border-radius: 50%; border: 2px solid var(--magenta); color: white; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }

        /* CARDS & LAYOUT */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { border-left: 5px solid var(--magenta); padding-left: 15px; margin: 40px 0 20px; font-size: 26px; color: #fff; text-transform: uppercase; text-shadow: 0 0 10px var(--magenta); }
        .prog-lista { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .ranking-box { background: #111428; border-radius: 15px; border: 1px solid #222; margin-bottom: 40px; overflow: hidden;}
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1a1a2e; border-radius: 15px; overflow: hidden; border: 2px solid #333; text-align: center; padding-bottom: 20px; transition: 0.4s; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--magenta); box-shadow: 0 0 30px var(--magenta); transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        .carousel-container { width: 100%; overflow: hidden; padding: 20px 0; margin-top: 50px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .carousel-track { display: flex; gap: 20px; animation: scroll 25s linear infinite; width: max-content; }
        .card-anuncio { min-width: 280px; background: #1a1a2e; border-radius: 15px; overflow: hidden; border: 1px solid #333; text-align: center; padding-bottom: 15px; }
        .card-anuncio img { width: 100%; height: 180px; object-fit: cover; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* MURAL & FOOTER */
        .mural-container { background: #111428; padding: 20px; border-radius: 15px; border: 1px solid var(--magenta); margin-top: 30px; }
        .mural-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #333; background: #0a0e27; color: white; box-sizing:border-box; }
        .btn-enviar { background: var(--magenta); color: white; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 25px; right: 25px; background-color: var(--verde-whatsapp); color: #000; border-radius: 50px; display: flex; align-items: center; justify-content: center; z-index: 10001; }
        footer { background: #000; padding: 50px 20px; text-align: center; border-top: 2px solid var(--magenta); }
        .social-icon { width: 45px; margin: 0 10px; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); z-index: 50000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0e27; border: 2px solid var(--magenta); border-radius: 20px; width: 90%; max-width: 450px; position: relative; padding-bottom: 20px; overflow: hidden; }
        .close-modal { position: absolute; top: 15px; right: 20px; color: white; font-size: 30px; cursor: pointer; z-index: 50; }
    </style>
</head>
<body>

    <div id="modal-container" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">×</span>
            <div class="modal-header" style="padding: 20px; text-align: center;"><h2 id="modal-title" style="color: var(--dourado);">Título</h2></div>
            <div class="modal-body" id="modal-body" style="padding: 20px; text-align: center; color: white;"></div>
            <div class="carousel-nav" id="carousel-controls" style="display:none; justify-content: space-between; padding: 0 20px;">
                <button onclick="prevSlide()" style="background:none; border:1px solid var(--magenta); color:white; border-radius:50%; width:40px; height:40px;">❮</button>
                <span id="slide-counter" style="color: #888;">1 / 10</span>
                <button onclick="nextSlide()" style="background:none; border:1px solid var(--magenta); color:white; border-radius:50%; width:40px; height:40px;">❯</button>
            </div>
        </div>
    </div>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="top1.jpg" alt="Rádio Top" class="splash-logo" style="width: 200px; border-radius: 50%;">
            <h1 style="color: white;">RADIO TOP ITATIBA</h1>
            <button class="btn-entrar-top" onclick="iniciarSite()">ENTRAR AGORA</button>
        </div>
    </div>

    <nav>
        <a href="#">HOME</a>
        <a href="#video">TV TOP</a>
        <a href="#pedido">PEDIR MÚSICA</a>
        <a href="#mural">MURAL</a>
    </nav>

    <div class="video-embed-container">
        <div class="video-embed">
            <div id="blur-bg" class="bg-blur-layer" style="background-image: url('top1.jpg');"></div>
            <img id="capa-album-tv" src="top1.jpg" class="capa-tv-img" alt="Capa">
        </div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <div style="text-align: center;">
                <span id="nome-musica" style="font-size: 18px; font-weight: bold; color:white;">Carregando...</span><br>
                <span class="ouvintes-count">🎧 <span id="qtd-ouvintes">...</span> OUVINTES</span>
            </div>
        </div>
        <audio id="radio-top" crossorigin="anonymous"><source src="https://server27.srvsh.com.br:6674/stream" type="audio/mpeg"></audio>
        <div class="glass-controls">
            <button id="btn-player" class="btn-player-modern" onclick="togglePlay()">▶</button>
            <input type="range" id="vol-control" min="0" max="1" step="0.1" value="0.5" onchange="changeVolume(this.value)">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="gerarStory()" style="background: var(--magenta); border:none; color:white; padding:10px; border-radius:20px;">📸 STORY</button>
        </div>
    </div>

    <div class="container">
        <h2 id="mural" class="section-title">💬 CHAT COM O ESTÚDIO</h2>
        <div class="mural-container">
            <div id="chat-box" style="height: 250px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
                <div class="chat-msg bot-msg"><strong>🤖 Top:</strong> Olá! Mande seu recado aqui!</div>
            </div>
            <form id="form-chat">
                <input type="text" id="nome-chat" class="mural-input" placeholder="Seu Nome" required>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msg-chat" class="mural-input" placeholder="Mensagem..." required style="flex:1;">
                    <button type="submit" class="btn-enviar" style="width:60px;">🚀</button>
                </div>
            </form>
            <button onclick="ativarNotificacoes()" style="background:none; border:none; color:#555; font-size:10px; width:100%; margin-top:10px;">🔔 Ativar Notificações</button>
        </div>

        <h2 class="section-title">🤝 NOSSOS PARCEIROS</h2>
        <div class="carousel-container">
            <div class="carousel-track" id="track-parceiros">
                <p style="color:#888; text-align: center; width: 100%;">Buscando parceiros...</p>
            </div>
        </div>
    </div>

    <script>
        const urlGoogle = "https://script.google.com/macros/s/AKfycbx6ziX6OLr6qXy1kDSOIX3yGZx4YvbQZQ5LDm6E7CtFigkWqYAcrbPM03joatzGeMtpFw/exec";
        let audio = document.getElementById('radio-top');
        let isPlaying = false;
        let modalData = []; let modalIndex = 0;

        function togglePlay() {
            if(isPlaying) { audio.pause(); isPlaying = false; document.getElementById('btn-player').innerText = "▶"; }
            else { audio.play(); isPlaying = true; document.getElementById('btn-player').innerText = "⏸"; }
        }

        function changeVolume(v) { audio.volume = v; }

        // --- CARREGAR PARCEIROS (CORRIGIDO) ---
        function carregarAnuncios() {
            fetch(urlGoogle + "?action=getAnuncios").then(r => r.json()).then(data => {
                const track = document.getElementById('track-parceiros');
                if (data && data.length > 0) {
                    let html = ""; 
                    data.forEach(item => { 
                        html += `<div class="card-anuncio"><a href="${item.link}" target="_blank"><img src="${item.imagem}" alt="${item.nome}"><div style="padding:10px; color:var(--dourado);"><h4>${item.nome}</h4></div></a></div>`; 
                    });
                    track.innerHTML = html + html; // Duplica para o scroll infinito
                } else { track.innerHTML = '<p style="color:#888;">Seja um parceiro!</p>'; }
            }).catch(() => { document.getElementById('track-parceiros').innerHTML = "Erro ao carregar."; });
        }

        // --- CHAT INTERATIVO ---
        document.getElementById('form-chat').addEventListener('submit', function(e) {
            e.preventDefault();
            const nome = document.getElementById('nome-chat').value;
            const msgInput = document.getElementById('msg-chat');
            const msg = msgInput.value;
            const chatBox = document.getElementById('chat-box');

            chatBox.innerHTML += `<div class="chat-msg user-msg"><strong>${nome}:</strong> ${msg}</div>`;
            msgInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `<div class="typing-indicator" id="${typingId}" style="display:block;">Digitando...</div>`;

            fetch(urlGoogle, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nome: nome, mensagem: msg }) });

            setTimeout(() => {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="chat-msg bot-msg"><strong>🤖 Top:</strong> Valeu, ${nome}! Recado enviado! 🚀</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 2000);
        });

        function ativarNotificacoes() {
            Notification.requestPermission().then(p => { if(p === "granted") new Notification("Rádio Top", {body: "Notificações ativadas!"}); });
        }

        function atualizarMetadados() {
            const proxy = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent("http://server27.srvsh.com.br:6674/currentsong?sid=1&t=" + new Date().getTime());
            fetch(proxy).then(r => r.text()).then(d => { document.getElementById('nome-musica').innerText = d.includes("<html") ? "Top Itatiba" : d; });
        }

        function carregarConfig() {
            fetch(urlGoogle + "?action=getConfig").then(r => r.json()).then(data => {
                if(data.tv) document.getElementById('capa-album-tv').src = data.tv;
            });
        }

        function iniciarSite() {
            document.getElementById('splash-screen').style.display = 'none';
            carregarAnuncios();
            atualizarMetadados();
            carregarConfig();
            setInterval(atualizarMetadados, 15000);
        }

        function fecharModal() { document.getElementById('modal-container').style.display = 'none'; }
    </script>
</body>
</html>
